server:
  port: 8080

spring:
  application:
    name: shreduck
  datasource:
    url: jdbc:postgresql://localhost:5432/shreduck
    username: master
    password:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    operationsSorter: alpha
    path: /
